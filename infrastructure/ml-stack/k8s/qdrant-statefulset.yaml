apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc-0
  namespace: ml-stack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: ml-stack
spec:
  serviceName: qdrant
  replicas: 3
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:v1.7.0
        ports:
        - containerPort: 6333
          name: http
        - containerPort: 6334
          name: grpc
        env:
        - name: QDRANT_API_KEY
          valueFrom:
            secretKeyRef:
              name: qdrant-secret
              key: api-key
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 8Gi
        volumeMounts:
        - name: qdrant-data
          mountPath: /qdrant/storage
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: qdrant
              topologyKey: kubernetes.io/hostname
      volumes:
      - name: qdrant-data
        persistentVolumeClaim:
          claimName: qdrant-pvc-0

---
apiVersion: v1
kind: Secret
metadata:
  name: qdrant-secret
  namespace: ml-stack
type: Opaque
stringData:
  api-key: ${QDRANT_API_KEY:-qdrant-secure-key-change-me}

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: ml-stack
  labels:
    app: qdrant
spec:
  ports:
  - port: 6333
    targetPort: 6333
    name: http
  - port: 6334
    targetPort: 6334
    name: grpc
  clusterIP: None
  selector:
    app: qdrant

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: ml-stack
  labels:
    app: qdrant
spec:
  ports:
  - port: 6333
    targetPort: 6333
    name: http
  - port: 6334
    targetPort: 6334
    name: grpc
  selector:
    app: qdrant
  type: ClusterIP
