apiVersion: v1
kind: ConfigMap
metadata:
  name: feast-config
  namespace: ml-stack
data:
  feature_store.yaml: |
    project: elevatediq
    registry: data/registry.db
    provider: gcp
    online_store:
      type: redis
      redis_type: redis
      connection_string: redis:6379
    offline_store:
      type: bigquery
      project_id: elevatediq-ml
      dataset_id: feast_features
    entity_server:
      port: 6566

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feast-api
  namespace: ml-stack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feast-api
  template:
    metadata:
      labels:
        app: feast-api
    spec:
      containers:
      - name: feast-api
        image: feastdev/feast:v0.36.0-python3.11
        command:
          - feast
          - serve
          - --host
          - "0.0.0.0"
          - --port
          - "6566"
        ports:
        - containerPort: 6566
          name: http
        env:
        - name: FEAST_REPO
          value: /feast/repo
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        volumeMounts:
        - name: feast-config
          mountPath: /feast/repo
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: feast-config
        configMap:
          name: feast-config

---
apiVersion: v1
kind: Service
metadata:
  name: feast-api
  namespace: ml-stack
  labels:
    app: feast-api
spec:
  ports:
  - port: 6566
    targetPort: 6566
    name: http
  selector:
    app: feast-api
  type: ClusterIP
