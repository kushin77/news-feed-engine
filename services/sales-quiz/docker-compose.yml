version: '3.8'

services:
  sales-quiz:
    build: .
    container_name: sales-quiz
    ports:
      - "5005:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - sales-quiz-network

  db:
    image: postgres:15-alpine
    container_name: sales-quiz-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=sales_quiz
    volumes:
      - sales-quiz-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    networks:
      - sales-quiz-network

volumes:
  sales-quiz-data:

networks:
  sales-quiz-network:
    driver: bridge
