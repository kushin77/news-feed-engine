version: '3.8'

services:
  gamification:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - gamification-network

  db:
    image: postgres:15-alpine
    container_name: gamification-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=gamification
    volumes:
      - gamification-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    networks:
      - gamification-network

volumes:
  gamification-data:

networks:
  gamification-network:
    driver: bridge
