name: Python CI

on:
  push:
    branches: [ main, 'blackboxai/**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/news-feed-engine
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          cd processor
          pip install -r requirements.txt pytest pytest-cov ruff black
      - name: Lint
        run: make lint-python
      - name: Test
        run: make test-python
      - name: Coverage
        uses: codecov/codecov-action@v5
